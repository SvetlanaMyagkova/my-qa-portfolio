<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <!-- мягкое рассеянное свечение -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- градиент точки -->
    <radialGradient id="dot" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#b6ffd1"/>
      <stop offset="100%" stop-color="#59f59f"/>
    </radialGradient>
  </defs>

  <!-- фон -->
  <rect width="64" height="64" rx="16" fill="#04110b"/>

  <!-- буква S (увеличили) -->
  <text x="32" y="50"
        text-anchor="middle"
        font-size="36"
        font-family="Inter, Arial, sans-serif"
        font-weight="800"
        fill="#f0fff6">
    SM
  </text>

  <!-- мягкое свечение -->
  <circle cx="44" cy="16" r="7" fill="#59f59f" opacity="0.25" filter="url(#glow)"/>

  <!-- основная точка -->
  <circle cx="44" cy="16" r="5.5" fill="url(#dot)"/>
</svg>